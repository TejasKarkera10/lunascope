name: Build Windows App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv\Scripts\pip install --upgrade pip
          .venv\Scripts\pip install -e .
          .venv\Scripts\pip install nuitka

      - name: Build app
        run: echo Y | .venv\Scripts\pyside6-deploy -c pysidedeploy.spec

      - name: List build output
        run: Get-ChildItem -Recurse -Depth 2 .

      - name: Zip app
        run: Compress-Archive -Path dist\Lunascope -DestinationPath dist\Lunascope-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lunascope-Windows
          path: dist\Lunascope-Windows.zip
