name: Build Windows App

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          if (Test-Path .venv) { Remove-Item -Recurse -Force .venv }
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          if (Test-Path deployment) { Remove-Item -Recurse -Force deployment }
          python -m venv .venv
          .venv\Scripts\pip install --upgrade pip
          .venv\Scripts\pip install .
          .venv\Scripts\pip install nuitka==2.7.11

      - name: Patch Nuitka SciPy config
        run: |
          .venv\Scripts\python scripts\patch_nuitka_package_config.py

      - name: Build app
        run: .venv\Scripts\pyside6-deploy -f -c pysidedeploy.spec

      - name: Normalize app output path
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $outputPath = Get-ChildItem deployment, dist -Directory -Filter *.dist -ErrorAction SilentlyContinue |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $outputPath) {
            Write-Host "No .dist directory found under deployment or dist"
            Get-ChildItem deployment, dist -Recurse -Depth 3 -ErrorAction SilentlyContinue
            exit 1
          }
          Write-Host "Using app output: $outputPath"
          $normalizedPath = Join-Path (Resolve-Path dist) "Lunascope.dist"
          if ($outputPath -ne $normalizedPath) {
            if (Test-Path $normalizedPath) { Remove-Item -Recurse -Force $normalizedPath }
            Copy-Item -Recurse -Force $outputPath $normalizedPath
          }

      - name: Ensure Matplotlib data is bundled
        run: |
          $mplDataDir = .venv\Scripts\python -c "import matplotlib; print(matplotlib.get_data_path())"
          $targetDir = Join-Path (Resolve-Path dist) "Lunascope.dist\matplotlib\mpl-data"
          $targetParent = Split-Path $targetDir -Parent
          New-Item -ItemType Directory -Force -Path $targetParent | Out-Null
          if (Test-Path $targetDir) { Remove-Item -Recurse -Force $targetDir }
          Copy-Item -Recurse -Force $mplDataDir $targetDir
          if (-not (Test-Path (Join-Path $targetDir "matplotlibrc"))) { throw "matplotlibrc missing from bundled Matplotlib data" }

      - name: Ensure UI file is bundled
        run: |
          $targetDir = Join-Path (Resolve-Path dist) "Lunascope.dist\lunascope\ui"
          New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
          Copy-Item -Force src\lunascope\ui\main.ui (Join-Path $targetDir "main.ui")
          if (-not (Test-Path (Join-Path $targetDir "main.ui"))) { throw "main.ui missing from bundled UI data" }

      - name: List build output
        run: Get-ChildItem -Recurse -Depth 3 deployment, dist -ErrorAction SilentlyContinue

      - name: Zip app
        run: |
          if (Test-Path Lunascope-Windows.zip) { Remove-Item -Force Lunascope-Windows.zip }
          Compress-Archive -Path dist\Lunascope.dist -DestinationPath Lunascope-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lunascope-Windows
          path: Lunascope-Windows.zip

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if gh release view latest-build > /dev/null 2>&1; then
            gh release upload latest-build --clobber Lunascope-Windows.zip
          else
            gh release create latest-build \
              --title "Latest Build" \
              --prerelease \
              --notes "Latest automated build. Download the zip and extract to run." \
              Lunascope-Windows.zip
          fi
