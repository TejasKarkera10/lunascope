name: Build Windows App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv\Scripts\pip install --upgrade pip
          .venv\Scripts\pip install -e .
          .venv\Scripts\pip install nuitka

      - name: Build app
        run: echo Y | .venv\Scripts\pyside6-deploy -c pysidedeploy.spec

      - name: List build output
        run: Get-ChildItem -Recurse -Depth 3 deployment, dist -ErrorAction SilentlyContinue

      - name: Zip app
        run: |
          $src = if (Test-Path dist\Lunascope) { "dist\Lunascope" } else { "deployment\launch.dist" }
          Compress-Archive -Path $src -DestinationPath Lunascope-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lunascope-Windows
          path: Lunascope-Windows.zip
