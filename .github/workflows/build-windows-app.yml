name: Build Windows App

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          if (Test-Path .venv) { Remove-Item -Recurse -Force .venv }
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          if (Test-Path deployment) { Remove-Item -Recurse -Force deployment }
          python -m venv .venv
          .venv\Scripts\pip install --upgrade pip
          .venv\Scripts\pip install .
          .venv\Scripts\pip install nuitka==2.7.11

      - name: Patch Nuitka SciPy config
        run: |
          .venv\Scripts\python -c "from pathlib import Path; import nuitka; broken_block = '''- module-name: 'scipy.optimize._cobyla_py' # checksum: 3ea0b5b1
            implicit-imports:
              - post-import-code:
                  - |
                    import scipy.optimize._cobyla
                    orig_minimize=scipy.optimize._cobyla.minimize

                    def nuitka_compatible_minimize(*args, **kwargs):
                      if len(args) > 0:
                        arg0 = args[0]
                        wrapper = eval(\"\"\"lambda x, con: arg0(x, con)\"\"\", locals())
                        args = list(args)
                        args[0] = wrapper
                      if \"callback\" in kwargs:
                        kw_callback = kwargs[\"callback\"]
                        callback_wrapper = eval(\"\"\"lambda x: kw_callback(x)\"\"\", locals())
                        kwargs[\"callback\"] = callback_wrapper
                      return orig_minimize(*args, **kwargs)
                    scipy.optimize._cobyla.minimize=nuitka_compatible_minimize
          '''; config_path = Path(nuitka.__file__).resolve().parent / 'plugins' / 'standard' / 'standard.nuitka-package.config.yml'; text = config_path.read_text(encoding='utf-8'); config_path.write_text(text.replace(broken_block, '', 1), encoding='utf-8') if broken_block in text else None; print(f'Patched broken SciPy COBYLA Nuitka rule in {config_path}' if broken_block in text else f'No SciPy COBYLA patch needed in {config_path}')"

      - name: Build app
        run: .venv\Scripts\pyside6-deploy -f -c pysidedeploy.spec

      - name: Normalize app output path
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $outputPath = Get-ChildItem deployment, dist -Directory -Filter *.dist -ErrorAction SilentlyContinue |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $outputPath) {
            Write-Host "No .dist directory found under deployment or dist"
            Get-ChildItem deployment, dist -Recurse -Depth 3 -ErrorAction SilentlyContinue
            exit 1
          }
          Write-Host "Using app output: $outputPath"
          $normalizedPath = Join-Path (Resolve-Path dist) "Lunascope.dist"
          if ($outputPath -ne $normalizedPath) {
            if (Test-Path $normalizedPath) { Remove-Item -Recurse -Force $normalizedPath }
            Copy-Item -Recurse -Force $outputPath $normalizedPath
          }

      - name: List build output
        run: Get-ChildItem -Recurse -Depth 3 deployment, dist -ErrorAction SilentlyContinue

      - name: Zip app
        run: |
          if (Test-Path Lunascope-Windows.zip) { Remove-Item -Force Lunascope-Windows.zip }
          Compress-Archive -Path dist\Lunascope.dist -DestinationPath Lunascope-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lunascope-Windows
          path: Lunascope-Windows.zip

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if gh release view latest-build > /dev/null 2>&1; then
            gh release upload latest-build --clobber Lunascope-Windows.zip
          else
            gh release create latest-build \
              --title "Latest Build" \
              --prerelease \
              --notes "Latest automated build. Download the zip and extract to run." \
              Lunascope-Windows.zip
          fi
