name: Build Windows App

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache venv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-windows-${{ hashFiles('pyproject.toml') }}

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Nuitka\Nuitka\Cache
          key: nuitka-windows-${{ hashFiles('src/**/*.py', 'pysidedeploy.spec') }}
          restore-keys: nuitka-windows-

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv\Scripts\pip install --upgrade pip
          .venv\Scripts\pip install .
          .venv\Scripts\pip install nuitka

      - name: Build app
        run: echo Y | .venv\Scripts\pyside6-deploy -c pysidedeploy.spec

      - name: List build output
        run: Get-ChildItem -Recurse -Depth 3 deployment, dist -ErrorAction SilentlyContinue

      - name: Zip app
        run: |
          Compress-Archive -Path dist\Lunascope.dist -DestinationPath Lunascope-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lunascope-Windows
          path: Lunascope-Windows.zip

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if gh release view latest-build > /dev/null 2>&1; then
            gh release upload latest-build --clobber Lunascope-Windows.zip
          else
            gh release create latest-build \
              --title "Latest Build" \
              --prerelease \
              --notes "Latest automated build. Download the zip and extract to run." \
              Lunascope-Windows.zip
          fi
