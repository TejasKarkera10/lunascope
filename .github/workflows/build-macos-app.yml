name: Build macOS App

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          rm -rf .venv dist build
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install .
          pip install nuitka==2.7.11

      - name: Patch Nuitka SciPy config
        run: |
          source .venv/bin/activate
          python scripts/patch_nuitka_package_config.py

      - name: Build app
        run: |
          source .venv/bin/activate
          pyside6-deploy -f -c pysidedeploy.spec

      - name: Normalize app bundle path
        run: |
          mkdir -p dist
          app_path="$(find deployment dist -maxdepth 2 -type d -name '*.app' 2>/dev/null | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "No .app bundle found under deployment/ or dist/"
            find deployment dist -maxdepth 3 -print || true
            exit 1
          fi
          echo "Using app bundle: $app_path"
          if [ "$app_path" != "dist/Lunascope.app" ]; then
            rm -rf dist/Lunascope.app
            cp -R "$app_path" dist/Lunascope.app
          fi

      - name: Ensure Matplotlib data is bundled
        run: |
          source .venv/bin/activate
          mpl_data_dir="$(python - <<'PY'
          import matplotlib
          print(matplotlib.get_data_path())
          PY
          )"
          target_dir="dist/Lunascope.app/Contents/MacOS/matplotlib/mpl-data"
          mkdir -p "$(dirname "$target_dir")"
          rm -rf "$target_dir"
          cp -R "$mpl_data_dir" "$target_dir"
          test -f "$target_dir/matplotlibrc"

      - name: Ensure UI file is bundled
        run: |
          target_dir="dist/Lunascope.app/Contents/MacOS/lunascope/ui"
          mkdir -p "$target_dir"
          cp src/lunascope/ui/main.ui "$target_dir/main.ui"
          test -f "$target_dir/main.ui"

      - name: List build output
        run: |
          find deployment dist -maxdepth 3 -print || true

      - name: Ad-hoc sign app bundle
        run: |
          codesign --deep -s - --force dist/Lunascope.app

      - name: Zip app bundle
        run: |
          rm -f dist/Lunascope.app.zip
          ditto -c -k --sequesterRsrc --keepParent dist/Lunascope.app dist/Lunascope.app.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lunascope-macOS
          path: dist/Lunascope.app.zip

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view latest-build > /dev/null 2>&1; then
            gh release upload latest-build --clobber dist/Lunascope.app.zip
          else
            gh release create latest-build \
              --title "Latest Build" \
              --prerelease \
              --notes "Latest automated build. Download the zip and extract to run." \
              dist/Lunascope.app.zip
          fi
