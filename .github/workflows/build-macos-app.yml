name: Build macOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -e .
          pip install nuitka

      - name: Build app
        run: |
          source .venv/bin/activate
          pyside6-deploy -c pysidedeploy.spec

      - name: Zip app bundle
        run: |
          cd dist
          zip -r Lunascope.app.zip Lunascope.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lunascope-macOS
          path: dist/Lunascope.app.zip
