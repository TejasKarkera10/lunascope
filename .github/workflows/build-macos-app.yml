name: Build macOS App

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          rm -rf .venv dist build
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install .
          pip install nuitka==2.7.11

      - name: Patch Nuitka SciPy config
        run: |
          source .venv/bin/activate
          python - <<'PY'
          from pathlib import Path
          import nuitka

          broken_block = """- module-name: 'scipy.optimize._cobyla_py' # checksum: 3ea0b5b1
            implicit-imports:
              - post-import-code:
                  - |
                    import scipy.optimize._cobyla
                    orig_minimize=scipy.optimize._cobyla.minimize

                    def nuitka_compatible_minimize(*args, **kwargs):
                      if len(args) > 0:
                        arg0 = args[0]
                        wrapper = eval(\"\"\"lambda x, con: arg0(x, con)\"\"\", locals())
                        args = list(args)
                        args[0] = wrapper
                      if "callback" in kwargs:
                        kw_callback = kwargs["callback"]
                        callback_wrapper = eval(\"\"\"lambda x: kw_callback(x)\"\"\", locals())
                        kwargs["callback"] = callback_wrapper
                      return orig_minimize(*args, **kwargs)
                    scipy.optimize._cobyla.minimize=nuitka_compatible_minimize
          """

          config_path = (
              Path(nuitka.__file__).resolve().parent
              / "plugins"
              / "standard"
              / "standard.nuitka-package.config.yml"
          )
          text = config_path.read_text(encoding="utf-8")
          if broken_block in text:
              config_path.write_text(text.replace(broken_block, "", 1), encoding="utf-8")
              print(f"Patched broken SciPy COBYLA Nuitka rule in {config_path}")
          else:
              print(f"No SciPy COBYLA patch needed in {config_path}")
          PY

      - name: Build app
        run: |
          source .venv/bin/activate
          pyside6-deploy -f -c pysidedeploy.spec

      - name: Normalize app bundle path
        run: |
          mkdir -p dist
          app_path="$(find deployment dist -maxdepth 2 -type d -name '*.app' 2>/dev/null | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "No .app bundle found under deployment/ or dist/"
            find deployment dist -maxdepth 3 -print || true
            exit 1
          fi
          echo "Using app bundle: $app_path"
          if [ "$app_path" != "dist/Lunascope.app" ]; then
            rm -rf dist/Lunascope.app
            cp -R "$app_path" dist/Lunascope.app
          fi

      - name: List build output
        run: |
          find deployment dist -maxdepth 3 -print || true

      - name: Ad-hoc sign app bundle
        run: |
          codesign --deep -s - --force dist/Lunascope.app

      - name: Zip app bundle
        run: |
          rm -f dist/Lunascope.app.zip
          ditto -c -k --sequesterRsrc --keepParent dist/Lunascope.app dist/Lunascope.app.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lunascope-macOS
          path: dist/Lunascope.app.zip

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view latest-build > /dev/null 2>&1; then
            gh release upload latest-build --clobber dist/Lunascope.app.zip
          else
            gh release create latest-build \
              --title "Latest Build" \
              --prerelease \
              --notes "Latest automated build. Download the zip and extract to run." \
              dist/Lunascope.app.zip
          fi
